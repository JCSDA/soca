window begin: 2018-04-14T21:00:00Z
window length: PT6H
forecast length: PT6H

geometry:
  model1:
    nml_file_mpp: Data/fv3files/fmsmpp.nml
    trc_file: Data/fv3files/field_table
    akbk: Data/fv3files/akbk64.nc4
    # input.nml
    layout: [1,1]
    io_layout: [1,1]
    npx: 13
    npy: 13
    npz: 64
    ntiles: 6
    fieldsets:
      - fieldset: Data/fieldsets/dynamics.yaml
      - fieldset: Data/fieldsets/ufo.yaml
  model2:
    mom6_input_nml: ./inputnml/input.nml
    fields metadata: ./fields_metadata.yml

model:
  model1:
    name: FV3LM
    nml_file: Data/fv3files/input_gfs_c12.nml
    nml_file_pert: Data/fv3files/inputpert_4dvar.nml
    tstep: PT15M
    lm_do_dyn: 1
    lm_do_trb: 0
    lm_do_mst: 0
    model variables: [u,v,ua,va,T,DELP,sphum,ice_wat,liq_wat,o3mr,phis,
                      slmsk,sheleg,tsea,vtype,stype,vfrac,stc,smc,snwdph,
                      u_srf,v_srf,f10m]
  model2:
    name: SOCA
    tstep: PT1H
    advance_mom6: 1
    model variables: [cicen, hicen, socn, tocn, ssh, hocn, uocn, vocn, sw, lhf, shf, lw, us]

initial condition:
  model1:
    filetype: gfs
    state variables: [u,v,ua,va,T,DELP,sphum,ice_wat,liq_wat,o3mr,phis,
                      slmsk,sheleg,tsea,vtype,stype,vfrac,stc,smc,snwdph,
                      u_srf,v_srf,f10m,sss]
    datapath: Data/inputs/gfs_c12/bkg/
    filename_core: 20180414.210000.fv_core.res.nc
    filename_trcr: 20180414.210000.fv_tracer.res.nc
    filename_sfcd: 20180414.210000.sfc_data.nc
    filename_sfcw: 20180414.210000.fv_srf_wnd.res.nc
    filename_cplr: 20180414.210000.coupler.res
  model2:
    date: 2018-04-15T21:00:00Z # fake date!!!!
    read_from_file: 1
    basename: ./INPUT/
    ocn_filename: MOM.res.nc
    ice_filename: ice_model.res.nc
    sfc_filename: sfc.res.nc

observations:
  - obs space:
      name: gmi_gpm
      obsdatain:  {obsfile: Data/gmi_gpm_obs.nc}
      obsdataout: {obsfile: Data/foobar.nc}
      simulated variables: [brightness_temperature]
      channels: 1-13
    obs operator:
      name: CRTM
      Absorbers: [H2O,O3,CO2]
      Clouds: [Water, Ice]
      Cloud_Fraction: 1.0
      linear obs operator:
        Absorbers: [H2O,O3,CO2]
        Clouds: [Water]
      obs options:
        Sensor_ID: gmi_gpm
        EndianType: little_endian
        CoefficientPath: Data/
    variables:
      model1:
        variables: [air_temperature,
                    humidity_mixing_ratio,
                    air_pressure,
                    air_pressure_levels,
                    effective_radius_of_cloud_liquid_water_particle,
                    effective_radius_of_cloud_ice_particle,
                    mass_content_of_cloud_ice_in_atmosphere_layer,
                    mass_content_of_cloud_liquid_water_in_atmosphere_layer,
                    mole_fraction_of_carbon_dioxide_in_air,
                    mole_fraction_of_ozone_in_air,
                    surface_wind_from_direction,
                    soil_type,
                    leaf_area_index,
                    vegetation_type_index,
                    surface_wind_speed,
                    surface_snow_thickness,
                    vegetation_area_fraction,
                    land_type_index,
                    volume_fraction_of_condensed_water_in_soil,
                    soil_temperature,
                    surface_temperature_where_snow,
                    surface_temperature_where_ice,
                    surface_temperature_where_land,
                    surface_snow_area_fraction,
                    ice_area_fraction,
                    land_area_fraction,
                    water_area_fraction ]
      model2:
        variables: [surface_temperature_where_sea ]
