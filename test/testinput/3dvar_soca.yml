# common filters used later on
_: &land_mask
  filter: Domain Check
  where:
  - variable: {name: sea_area_fraction@GeoVaLs}
    minvalue: 0.5

cost function:
  cost type: 3D-Var
  window begin: &date_begin 2018-04-14T00:00:00Z
  window length: P2D
  analysis variables: &soca_vars [cicen, hicen, socn, tocn, ssh, hocn, sw, lhf, shf, lw, us, chl, biop, mld, layer_depth]
  geometry:
    mom6_input_nml: ./inputnml/input.nml
    fields metadata: ./fields_metadata.yml
    notocean:
      init: true
      date_begin: 2018-04-14T00:00:00Z
      date_end: 2018-04-16T00:00:00Z
      variables: [air_temperature,
                humidity_mixing_ratio]
      filename: ./Data/smap_geoval_2018041500_m.nc4
      obs space:
        name: None
        obsdatain:  {obsfile: ./Data/smap_obs_2018041500_m.nc4}
        obsdataout:  {obsfile: ./Data/atm_out.nc}
        simulated variables:  [ None ]
      date_begin: 2018-04-14T00:00:00Z
      date_end: 2018-04-16T00:00:00Z
      variables: [air_temperature,
                  humidity_mixing_ratio,
                  air_pressure,
                  air_pressure_levels,
                  effective_radius_of_cloud_liquid_water_particle,
                  effective_radius_of_cloud_ice_particle,
                  mass_content_of_cloud_ice_in_atmosphere_layer,
                  mass_content_of_cloud_liquid_water_in_atmosphere_layer,
                  mole_fraction_of_carbon_dioxide_in_air,
                  mole_fraction_of_ozone_in_air,
                  surface_wind_from_direction,
                  soil_type,
                  leaf_area_index,
                  vegetation_type_index,
                  surface_wind_speed,
                  surface_snow_thickness,
                  vegetation_area_fraction,
                  land_type_index,
                  volume_fraction_of_condensed_water_in_soil,
                  soil_temperature,
                  surface_temperature_where_snow,
                  surface_temperature_where_ice,
                  surface_temperature_where_land,
                  surface_snow_area_fraction,
                  ice_area_fraction,
                  land_area_fraction,
                  water_area_fraction,
                  surface_temperature_where_sea ]
      filename: Data/smap_geoval_2018041500_m.nc4


  background:
    read_from_file: 1
    basename: ./INPUT/
    ocn_filename: MOM.res.nc
    ice_filename: cice.res.nc
    sfc_filename: sfc.res.nc
    date: &bkg_date 2018-04-15T00:00:00Z
    state variables: *soca_vars

  background error:
    verbosity: main
    covariance model: SocaError
    datadir: ./bump
    strategy: specific_univariate
    load_nicas: 1
    mpicom: 2
    date: 2018-04-15T00:00:00Z
    analysis variables: *soca_vars

    variable changes:

    - variable change: BkgErrFILT
      ocean_depth_min: 1000 # [m]
      rescale_bkgerr: 1.0
      efold_z: 2500.0       # [m]
      input variables: *soca_vars
      output variables: *soca_vars

    - variable change: BkgErrSOCA
      read_from_file: 3
      basename: ./
      ocn_filename: ocn.bkgerror.nc
      ice_filename: ice.bkgerror.nc
      date: *bkg_date
      t_min: 0.0
      t_max: 2.5
      s_min: 0.0
      s_max: 0.2
      ssh_min: 0.0 # std ssh=0 => ssh balance applied as
      ssh_max: 0.0 #              strong constraint
      cicen_min: 0.1
      cicen_max: 0.5
      hicen_min: 10.0
      hicen_max: 100.0
      chl_min: 0.003
      chl_max: 10.0
      biop_min: 0.0
      biop_max: 1.0e-6
      #fixed_std_sst: 0.005 # OK to create pretty increments
      #fixed_std_sss: 0.001 # but that option should not exist!
      input variables: *soca_vars
      output variables: *soca_vars

    - variable change: VertConvSOCA
      Lz_min: 10.0
      Lz_mld: 1
      Lz_mld_max: 500
      scale_layer_thick: 1.5
      input variables: *soca_vars
      output variables: *soca_vars

    - variable change: BalanceSOCA
      dsdtmax: 0.1
      dsdzmin: 3.0e-6
      dtdzmin: 1.0e-6
      nlayers: 10
      dcdt:
        filename: ./Data/kmask.nc
        name: dcdt
      input variables: *soca_vars
      output variables: *soca_vars

  observations:

  - obs space:
      name: radiometer_smap
      obsdatain:  {obsfile: Data/smap_obs_2018041500_m.nc4}
      obsdataout: {obsfile: Data/foobar.nc}
      simulated variables: [brightness_temperature]
      channels: 1-2
    obs operator:
      name: CRTM
      Absorbers: [H2O,O3,CO2]
      Clouds: [Water, Ice]
      Cloud_Fraction: 1.0
      linear obs operator:
        Atmosphere: off
        Surfaces: [Water_Temperature, Salinity]
      obs options:
        Sensor_ID: radiometer_smap
        EndianType: little_endian
        CoefficientPath: Data/
    obs error:
      covariance model: diagonal
    #obs filters:
    #- *land_mask

variational:
  minimizer:
    algorithm: RPCG
  iterations:
  - geometry:
      mom6_input_nml: ./inputnml/input.nml
      fields metadata: ./fields_metadata.yml
    ninner: 5
    gradient norm reduction: 1e-15
    test: on
    diagnostics:
      departures: ombg
    online diagnostics:
      write increment: true
    increment:
      datadir: Data
      date: *bkg_date
      exp: 3dvarsoca.iter1
      type: incr

output:
  datadir: Data
  exp: 3dvarsoca
  type: an

final:
  diagnostics:
    departures: oman
