verbosity: main
covariance model: SocaError
datadir: ./bump
strategy: specific_univariate
load_nicas: 1
mpicom: 2
date: '{{current_cycle}}'
analysis variables: $(an_variables)

variable changes:

- variable change: VertConvSOCA
  Lz_min: 0.0
  Lz_mld: 0
  Lz_mld_max: 1.0
  scale_layer_thick: 5
  input variables: $(an_variables)
  output variables: $(an_variables)

- variable change: BkgErrFILT
  ocean_depth_min: 0    # [m]
  rescale_bkgerr: 1.0
  efold_z: 2500.0       # [m]
  input variables: $(an_variables)
  output variables: $(an_variables)

- variable change: BkgErrGODAS
  t_min: 0.1
  t_max: 2.0
  t_dz:  20.0
  t_efold: 500.0
  s_min: 0.0
  s_max: 0.25
  ssh_min: 0.0   # value at EQ
  ssh_max: 0.0   # value in Extratropics
  ssh_phi_ex: 20 # lat of transition from extratropics
  cicen_min: 0.1
  cicen_max: 0.1
  hicen_min: 0.1
  hicen_max: 0.1
  input variables: $(an_variables)
  output variables: $(an_variables)

- variable change: HorizFiltSOCA
  niter: 2
  filter variables: $(an_variables)
  input variables: $(an_variables)
  output variables: $(an_variables)

- variable change: BalanceSOCA
  dsdtmax: 0.1
  dsdzmin: 3.0e-6
  dtdzmin: 1.0e-6
  nlayers: 10
  input variables: $(an_variables)
  output variables: $(an_variables)