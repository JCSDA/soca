resolution:
  $(GEOMETRY)

model:
  name: SOCA
  tstep: PT0H
  advance_mom6: 0
  model variables: $(an_variables)
  tocn_minmax: [-1.9, 33.0]
  socn_minmax: [0.1, 38.0]

background:
  read_from_file: 1
  date: '{{current_cycle}}'
  basename: ./RESTART_IN/
  ocn_filename: MOM.res.nc
  state variables: $(an_variables)

analysis:
  read_from_file: 1
  date: '{{current_cycle}}'
  basename: ./
  ocn_filename: precheckpoint.ocn.$(experiment).an.{{local_current_cycle}}.nc
  state variables: $(an_variables)